# Build cross-platform maturin wheels + sdist and publish to PyPI when a GitHub Release is published.
# abi3-py311 -> ONE wheel per (platform, arch) covers CPython >= 3.11.

name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:        # allow a manual dry-run (build artifacts only; publish job is release-gated)

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.platform.runner }} ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,   target: x86_64 }
          - { runner: ubuntu-latest,   target: aarch64 }
          - { runner: macos-latest,    target: x86_64 }   # cross-compiled on the arm64 runner (macos-13 Intel runners are retired)
          - { runner: macos-latest,    target: aarch64 }
          - { runner: windows-latest,  target: x64 }
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  pypi-publish:
    name: Publish release to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    if: github.event_name == 'release'
    permissions:
      id-token: write        # mandatory for trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/simplipy
    steps:
      - name: Retrieve distributions
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
