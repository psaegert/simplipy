on:
  push:
    branches: main
  pull_request:

name: pytest

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          lfs: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      # Rust toolchain: the inline core (simplipy._core) is compiled by maturin during the editable
      # install below.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Install the package and development requirements. maturin (PEP 660) builds + installs the Rust
      # extension for the editable install.
      - name: Install package and development requirements
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest tests

  rust-checks:
    name: Rust (fmt / clippy / test / deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --lib --all-features
      - name: cargo test (unit tests; corpus-dependent parity tests self-skip if fixtures absent)
        run: cargo test --lib
      - name: cargo-deny (supply-chain / license / advisory gate)
        uses: EmbarkStudios/cargo-deny-action@v2
